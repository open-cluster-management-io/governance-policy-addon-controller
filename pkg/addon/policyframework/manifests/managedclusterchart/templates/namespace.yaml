{{- if or (and (not .Values.onMulticlusterHub) (ne .Values.installMode "Hosted")) (and .Values.onMulticlusterHub .Values.syncPoliciesOnMulticlusterHub) }}
apiVersion: v1
kind: Namespace
metadata:
  name: "{{ .Values.clusterName }}"
  {{- if .Values.orphanClusterNamespace }}
  annotations:
    "addon.open-cluster-management.io/deletion-orphan": ""
  {{- end }}
{{- end }}

name: KinD tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

defaults:
  run:
    shell: bash

jobs:
  linting-and-unit-tests:
    runs-on: ubuntu-latest
    name: Linting and Unit tests
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Verify modules
      run: |
        go mod verify

    - name: Some quality checks
      run: |
        make fmt
        git diff --exit-code
        make lint
        make gosec-scan

    - name: Unit Tests
      # currently there are no unit tests, so there is no point in collecting coverage info here.
      run: |
        make test

  kind-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The "minimum" tag is set in the Makefile
        # KinD tags: https://hub.docker.com/r/kindest/node/tags
        kind:
          - 'minimum'
          - 'latest'
        hosted_mode:
          - "hosted"
          - ""
    name: KinD tests
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Create KinD Cluster (${{ matrix.kind }}) and deploy components
      env:
        KIND_VERSION: ${{ matrix.kind }}
        HOSTED_MODE: ${{ matrix.hosted_mode == 'hosted' && 'true' || 'false' }}
      run: |
        ./build/manage-clusters.sh

    - name: Ensure Service Account kubeconfig
      run: |
        make kind-controller-kubeconfig
        make kind-ensure-sa

    - if: matrix.hosted_mode == ''
      name: E2E tests
      run: |
        export GOPATH=$(go env GOPATH)
        make wait-for-work-agent
        make e2e-test-coverage

    - if: matrix.hosted_mode == 'hosted'
      name: E2E tests hosted mode
      run: |
        export GOPATH=$(go env GOPATH)
        make wait-for-work-agent
        make e2e-test-hosted-mode-coverage

    - name: Upload Test info
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: "${{matrix.kind}}-${{matrix.hosted_mode}}e2e-tests"
        path: |
          coverage_*.out
          report_*.xml

    - name: Debug
      if: ${{ failure() }}
      run: |
        RUN_MODE="debug" ./build/manage-clusters.sh

    - name: Clean up clusters
      if: ${{ always() }}
      run: |
        RUN_MODE="delete" ./build/manage-clusters.sh

  coverage-verification:
    needs: [kind-tests]
    defaults:
      run:
        working-directory: '.'
    name: Test Coverage Verification
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Download Test Results
      uses: actions/download-artifact@v8
      with:
        merge-multiple: true
        pattern: latest-*

    - name: Test Coverage Verification
      run: |
        make coverage-verify

    - name: Report e2e coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_UPLOAD_TOKEN }}
        files: ./coverage_e2e.out
        flags: e2e-tests
        name: e2e-tests
        fail_ci_if_error: false
        disable_search: true

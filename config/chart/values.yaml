# Default values for governance-policy-addon-controller.

# Aligned OCM version (used at release time for NOTES.txt)
ocm_version: v0.0

namespace: open-cluster-management

image:
  repository: quay.io/open-cluster-management/governance-policy-addon-controller
  tag: latest
  pullPolicy: Always
imagePullSecrets: []

env:
  configPolicyControllerImage: quay.io/open-cluster-management/config-policy-controller:latest
  governancePolicyFrameworkAddonImage: quay.io/open-cluster-management/governance-policy-framework-addon:latest

resources:
  requests:
    cpu: 25m
    memory: 64Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
